[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show verbose output with short tracebacks
addopts =
    -v
    --tb=short
    --no-header
    -q

# Markers for selective test runs
markers =
    unit: Unit tests (no external services)
    integration: Integration tests (needs running server)
    slow: Tests that take a long time (e.g., embedding model load)

# Filter known warnings to keep output clean
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:torch.*
    ignore::FutureWarning
